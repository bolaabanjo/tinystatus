name: tinystatus check

on:
    schedule:
        - cron: '*/5 * * * *'
    workflow_dispatch:

jobs:
    check:
        runs-on: ubuntu-latest
        timeout-minutes: 5

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - run: npm ci --omit=dev
            - run: npx tsx scripts/check.ts
              env:
                  DATABASE_URL: ${{ secrets.DATABASE_URL }}
                  CENCORI_API_KEY: ${{ secrets.CENCORI_API_KEY }}
